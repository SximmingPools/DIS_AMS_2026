services:
  postgres:
    image: postgres:16
    container_name: dis_ams_postgres
    environment:
      POSTGRES_DB: dis_ams
      POSTGRES_USER: dis_ams
      POSTGRES_PASSWORD: dis_ams
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./data:/data:ro

volumes:
  postgres_data:

